name: CI-CD

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v6

      - name: Install Dependencies
        run: npm install

      - name: Unit Test
        run: npm test

      - name: Upload Test Result
        uses: actions/upload-artifact@v7
        with:
          name: Test Result
          path: junit-report.xml